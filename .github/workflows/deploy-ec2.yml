# ═══════════════════════════════════════════════════════════════
# Auto-deploy Peoples Feedback Client to EC2 on every push
# Instance: 32.193.27.142 (Amazon Linux 2023)
# ═══════════════════════════════════════════════════════════════

name: Deploy to EC2

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: peoples-feedback-client/package-lock.json

      - name: Install & Build
        working-directory: peoples-feedback-client
        run: |
          npm ci
          npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          # Validate secrets
          if [ -z "$EC2_HOST" ]; then echo "❌ Error: EC2_HOST secret is missing"; exit 1; fi
          if [ -z "$EC2_USER" ]; then echo "❌ Error: EC2_USER secret is missing"; exit 1; fi
          if [ -z "$SSH_KEY" ]; then echo "❌ Error: EC2_SSH_KEY secret is missing"; exit 1; fi

          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ec2.pem
          # Ensure there is a newline at the end of the key (common PEM issue)
          sed -i '$a\' ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts 2>/dev/null
          
          # Create deployment package
          tar czf /tmp/dist.tar.gz -C peoples-feedback-client/dist .
          
          # Upload build to EC2
          scp -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no /tmp/dist.tar.gz $EC2_USER@$EC2_HOST:/tmp/dist.tar.gz

          # Deploy on EC2
          ssh -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST << 'REMOTE'
            set -e
            DEPLOY_DIR="/var/www/peoples-feedback"
            
            # Extract build
            sudo mkdir -p $DEPLOY_DIR
            sudo rm -rf $DEPLOY_DIR/*
            sudo tar xzf /tmp/dist.tar.gz -C $DEPLOY_DIR
            
            # Set permissions (nginx on Amazon Linux, www-data on Ubuntu)
            if id "nginx" &>/dev/null; then
              sudo chown -R nginx:nginx $DEPLOY_DIR
            else
              sudo chown -R www-data:www-data $DEPLOY_DIR
            fi
            
            rm -f /tmp/dist.tar.gz
            
            # Reload nginx
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Deploy complete"
          REMOTE
