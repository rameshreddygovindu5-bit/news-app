# Auto-deploy to EC2 — Peoples Feedback Platform
# Instance: i-0e448dd106cf9aeed (32.193.27.142)
#
# GitHub Secrets required:
#   EC2_HOST     — EC2 public IP (32.193.27.142)
#   EC2_USER     — SSH user (ubuntu)
#   EC2_SSH_KEY  — Full private SSH key (PEM contents)
#   VITE_API_URL — Leave empty (Nginx proxies /api/ → localhost:8005)

name: Deploy to EC2

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Node (for both frontend builds) ───────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: peoples-feedback-client/package-lock.json

      # ── Build: Public Client (Vite) ───────────────────────────────────
      - name: Build Public Client
        working-directory: peoples-feedback-client
        run: |
          npm ci || npm install
          npm run build
        env:
          VITE_API_URL: ""   # Nginx proxies /api/ -> localhost:8005

      # ── Build: Admin UI (React CRA) ───────────────────────────────────
      - name: Build Admin UI
        working-directory: news-platform-final/frontend
        run: |
          npm ci || npm install
          npm run build
        env:
          REACT_APP_API_URL: ""   # Nginx proxies /api/ -> localhost:8005

      # ── Package both builds ───────────────────────────────────────────
      - name: Package builds
        run: |
          tar czf /tmp/public-dist.tar.gz  -C peoples-feedback-client/dist .
          tar czf /tmp/admin-dist.tar.gz   -C news-platform-final/frontend/build .
          tar czf /tmp/backend.tar.gz      -C news-platform-final/backend \
            --exclude='./__pycache__' \
            --exclude='./venv' \
            --exclude='./*.db' \
            .
          # Also package nginx config script
          cp news-platform-final/update-nginx.sh /tmp/update-nginx.sh

      # ── SSH Deploy to EC2 ─────────────────────────────────────────────
      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_KEY:  ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST" ]; then echo "EC2_HOST secret missing"; exit 1; fi
          if [ -z "$EC2_USER" ]; then echo "EC2_USER secret missing"; exit 1; fi
          if [ -z "$SSH_KEY"  ]; then echo "EC2_SSH_KEY secret missing"; exit 1; fi

          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # ── 0. Pre-Cleanup (on EC2) ──────────────────────────────────
          echo "Clearing old builds from EC2 /tmp..."
          ssh -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" \
            "sudo rm -f /tmp/*.tar.gz /tmp/update-nginx.sh"

          # Upload all tarballs + nginx config
          scp -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no \
            /tmp/public-dist.tar.gz \
            /tmp/admin-dist.tar.gz \
            /tmp/backend.tar.gz \
            /tmp/update-nginx.sh \
            "$EC2_USER@$EC2_HOST:/tmp/"

          # Run remote deploy
          ssh -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" << 'REMOTE'
            set -e
            echo "========================================"
            echo "  Peoples Feedback — Deploying..."
            echo "========================================"

            # Ensure lsof is installed (Amazon Linux 2023)
            if ! command -v lsof &> /dev/null; then
                echo "Installing lsof..."
                sudo dnf install -y lsof -q
            fi

            # ── 1. Deploy Public Frontend ───────────────────────────────
            PUBLIC_DIR="/var/www/peoples-feedback"
            sudo mkdir -p $PUBLIC_DIR
            sudo rm -rf $PUBLIC_DIR/*
            sudo tar xzf /tmp/public-dist.tar.gz -C $PUBLIC_DIR
            sudo chown -R www-data:www-data $PUBLIC_DIR 2>/dev/null || \
              sudo chown -R nginx:nginx $PUBLIC_DIR 2>/dev/null || true
            echo "[1/3] Public frontend deployed to $PUBLIC_DIR"

            # ── 2. Deploy Admin UI ──────────────────────────────────────
            ADMIN_DIR="/var/www/peoples-feedback-admin"
            sudo mkdir -p $ADMIN_DIR
            sudo rm -rf $ADMIN_DIR/*
            sudo tar xzf /tmp/admin-dist.tar.gz -C $ADMIN_DIR
            sudo chown -R www-data:www-data $ADMIN_DIR 2>/dev/null || \
              sudo chown -R nginx:nginx $ADMIN_DIR 2>/dev/null || true
            echo "[2/3] Admin UI deployed to $ADMIN_DIR"

            # ── 3. Deploy Backend ───────────────────────────────────────
            BACKEND_DIR="$HOME/news-platform-final/backend"
            mkdir -p $BACKEND_DIR
            tar xzf /tmp/backend.tar.gz -C $BACKEND_DIR
            echo "[3/4] Backend files updated in $BACKEND_DIR"

            # Install/update Python deps
            cd $BACKEND_DIR
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            source venv/bin/activate
            pip install -r requirements.txt -q

            # Create uploads directory
            mkdir -p $BACKEND_DIR/uploads

            # Set EC2 production environment (override local dev settings)
            # IS_LOCAL_DEV=false means AWS sync is DISABLED (data is already local on EC2)
            # DATABASE_URL points to PostgreSQL (not SQLite)
            sed -i 's/^IS_LOCAL_DEV=.*/IS_LOCAL_DEV=false/' $BACKEND_DIR/.env 2>/dev/null || true
            grep -q "IS_LOCAL_DEV" $BACKEND_DIR/.env || echo "IS_LOCAL_DEV=false" >> $BACKEND_DIR/.env
            sed -i 's|^DATABASE_URL=sqlite.*|DATABASE_URL=postgresql+asyncpg://appuser:PF2026Secure%21%40%23@localhost:5432/news_db_fe|' $BACKEND_DIR/.env 2>/dev/null || true
            sed -i 's|^DATABASE_URL_SYNC=sqlite.*|DATABASE_URL_SYNC=postgresql://appuser:PF2026Secure%21%40%23@localhost:5432/news_db_fe|' $BACKEND_DIR/.env 2>/dev/null || true

            # Run DB migration (skip gracefully if script missing)
            python -c "from app.database import Base; from app.models.models import *; print('Models loaded OK')" || echo "Model check warnings"

            # ── 4. Restart Backend ──────────────────────────────────────
            PID=$(sudo lsof -t -i :8005 2>/dev/null || true)
            if [ -n "$PID" ]; then
              echo "Stopping existing backend (PID: $PID)..."
              sudo kill -9 $PID 2>/dev/null || true
              sleep 2
            fi

            nohup uvicorn app.main:app \
              --host 0.0.0.0 \
              --port 8005 \
              --workers 2 \
              >> $BACKEND_DIR/backend.log 2>&1 &
            disown
            sleep 3
            echo "[4/4] Backend restarted on port 8005"

            # ── 5. Update & Reload Nginx ────────────────────────────────
            sudo bash /tmp/update-nginx.sh || (sudo nginx -t && sudo systemctl reload nginx)
            echo "[5/5] Nginx updated and reloaded"

            # Clean up
            rm -f /tmp/public-dist.tar.gz /tmp/admin-dist.tar.gz /tmp/backend.tar.gz /tmp/update-nginx.sh

            echo "========================================"
            echo "  Deploy complete: $(date)"
            echo "  Public:  http://$HOSTNAME"
            echo "  Admin:   http://$HOSTNAME/admin/"
            echo "  Backend: http://$HOSTNAME:8005/docs"
            echo "========================================"
          REMOTE
