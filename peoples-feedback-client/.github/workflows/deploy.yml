# ═══════════════════════════════════════════════════════════════
# Auto-deploy Peoples Feedback Client to EC2 on every push
#
# Instance: i-0e448dd106cf9aeed (AWS 023036697290)
#
# GitHub Secrets needed (Settings → Secrets → Actions):
#   EC2_HOST         — EC2 public IP (e.g. 32.193.27.142)
#   EC2_SSH_KEY      — Full private SSH key (PEM format)
#   EC2_USER         — SSH user (ubuntu or ec2-user)
#   VITE_API_URL     — Backend API URL (e.g. http://32.193.27.142:8005)
# ═══════════════════════════════════════════════════════════════

name: Deploy to EC2

on:
  push:
    branches: [main, master]
    paths:
      - 'peoples-feedback-client/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: peoples-feedback-client

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: peoples-feedback-client/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Deploy to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          # Write SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/ec2.pem
          chmod 600 ~/.ssh/ec2.pem
          ssh-keyscan -H $EC2_HOST >> ~/.ssh/ec2.known_hosts 2>/dev/null
          SSH="ssh -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no $EC2_USER@$EC2_HOST"

          # Upload build to EC2
          tar czf /tmp/dist.tar.gz -C dist .
          scp -i ~/.ssh/ec2.pem -o StrictHostKeyChecking=no \
            /tmp/dist.tar.gz $EC2_USER@$EC2_HOST:/tmp/dist.tar.gz

          # Deploy on EC2
          $SSH << 'REMOTE'
            set -e
            DEPLOY_DIR="/var/www/peoples-feedback"
            sudo mkdir -p $DEPLOY_DIR
            sudo rm -rf $DEPLOY_DIR/*
            sudo tar xzf /tmp/dist.tar.gz -C $DEPLOY_DIR
            sudo chown -R www-data:www-data $DEPLOY_DIR 2>/dev/null || true
            rm -f /tmp/dist.tar.gz

            # Reload nginx
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Deploy complete: $(date)"
          REMOTE

          echo "✅ Deployed to http://$EC2_HOST"
